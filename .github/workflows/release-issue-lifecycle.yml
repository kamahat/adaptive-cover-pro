name: "Release Issue Lifecycle"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v2.18.1)"
        required: true
      release_url:
        description: "Release URL"
        required: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  release-lifecycle:
    name: "Process Issues on Stable Release"
    runs-on: ubuntu-latest
    # Only run for stable releases; skip betas/pre-releases (release event only)
    if: github.event_name == 'workflow_dispatch' || (github.event.release.prerelease == false && !contains(github.event.release.tag_name, '-beta') && !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-rc'))

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "Find previous stable tag and extract issue references"
        id: refs
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name || inputs.tag_name }}"

          # Find the previous stable tag (exclude pre-release AND nightly tags).
          # Nightlies are now PEP440 .dev builds (no hyphen) plus legacy -nightly.;
          # both must be excluded or one could be picked as PREV_TAG, yielding an
          # empty commit range and zero issue refs.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -v -E '\-(beta|alpha|rc|nightly)\.|\.dev' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -1)

          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "Previous stable tag: ${PREV_TAG:-'(none)'}"

          # Get commit range
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"%s%n%b" "${CURRENT_TAG}")
          else
            LOG=$(git log --pretty=format:"%s%n%b" "${PREV_TAG}..${CURRENT_TAG}")
          fi

          # Extract unique issue/PR numbers — keyword refs and bare (#NNN) parentheticals
          NUMBERS=$(echo "$LOG" \
            | grep -ioE '(refs?|closes?|fixes?|resolves?)[[:space:]]+#[0-9]+|\(#[0-9]+\)' \
            | grep -oE '[0-9]+' \
            | sort -u \
            | tr '\n' ' ')

          echo "numbers=${NUMBERS}" >> $GITHUB_OUTPUT
          echo "Referenced numbers: ${NUMBERS:-'(none)'}"

      - name: "Apply waiting-for-confirmation to issues; notify PRs"
        uses: actions/github-script@v9
        env:
          NUMBERS: ${{ steps.refs.outputs.numbers }}
          CURRENT_TAG: ${{ steps.refs.outputs.current_tag }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
        with:
          script: |
            const numbers = process.env.NUMBERS.trim().split(/\s+/).filter(Boolean).map(Number);
            const tag = process.env.CURRENT_TAG;
            const releaseUrl = process.env.RELEASE_URL;

            if (numbers.length === 0) {
              console.log('No issue/PR references found in this release range.');
              return;
            }

            console.log(`Processing: #${numbers.join(', #')}`);

            // Ensure required labels exist
            for (const [name, color, description] of [
              ['waiting-for-confirmation', '0075CA', 'Shipped in a release — awaiting reporter verification'],
              ['released', '0E8A16', 'Fix has shipped in a stable production release'],
            ]) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description });
                console.log(`Created ${name} label.`);
              }
            }

            // Cache fetched items to avoid redundant API calls
            const itemCache = new Map();

            async function fetchItem(num) {
              if (itemCache.has(num)) return itemCache.get(num);
              try {
                const response = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                itemCache.set(num, response.data);
                return response.data;
              } catch {
                itemCache.set(num, null);
                return null;
              }
            }

            async function processIssue(num) {
              const item = await fetchItem(num);
              if (!item) {
                console.log(`#${num} not found, skipping.`);
                return;
              }
              const currentLabels = item.labels.map(l => l.name);
              if (currentLabels.includes('awaiting-release')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  name: 'awaiting-release',
                }).catch(() => {});
              }
              if (item.state === 'open') {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  labels: ['waiting-for-confirmation', 'released'],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: `This fix has shipped in [**${tag}**](${releaseUrl}). Please confirm whether this resolves your issue by leaving a comment below.\n\nIf I don't hear back in 14 days, this issue will be automatically closed — feel free to reopen if the problem persists.`,
                });
                console.log(`Labeled issue #${num} as waiting-for-confirmation + released.`);
              } else {
                console.log(`Issue #${num} is already closed, skipping.`);
              }
            }

            // Numbers from commit log — used for deduplication
            const seenNumbers = new Set(numbers);

            // Linked issues found in PR bodies — processed after the main loop
            const linkedIssueQueue = new Set();

            for (const num of numbers) {
              const item = await fetchItem(num);
              if (!item) {
                console.log(`#${num} not found, skipping.`);
                continue;
              }

              const isPR = !!item.pull_request;
              const currentLabels = item.labels.map(l => l.name);

              if (isPR) {
                // Remove awaiting-release from merged PRs and notify
                if (currentLabels.includes('awaiting-release')) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    name: 'awaiting-release',
                  }).catch(() => {});
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: `This was included in [**${tag}**](${releaseUrl}). Thank you for the contribution! 🎉`,
                });
                console.log(`Notified PR #${num} of release ${tag}.`);

                // Scan PR body for linked issue references (e.g. "Fixes #260")
                try {
                  const prData = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: num,
                  });
                  const prBody = prData.data.body || '';
                  const bodyPattern = /(?:refs?|closes?|fixes?|resolves?)\s+#(\d+)/gi;
                  let bodyMatch;
                  while ((bodyMatch = bodyPattern.exec(prBody)) !== null) {
                    const linkedNum = parseInt(bodyMatch[1], 10);
                    if (linkedNum !== num && !seenNumbers.has(linkedNum)) {
                      linkedIssueQueue.add(linkedNum);
                    }
                  }
                } catch {
                  console.log(`Could not fetch PR body for #${num}, skipping body scan.`);
                }

              } else {
                // Issue — swap to waiting-for-confirmation and comment
                if (currentLabels.includes('awaiting-release')) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    name: 'awaiting-release',
                  }).catch(() => {});
                }

                if (item.state === 'open') {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    labels: ['waiting-for-confirmation', 'released'],
                  });

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    body: `This fix has shipped in [**${tag}**](${releaseUrl}). Please confirm whether this resolves your issue by leaving a comment below.\n\nIf I don't hear back in 14 days, this issue will be automatically closed — feel free to reopen if the problem persists.`,
                  });
                  console.log(`Labeled issue #${num} as waiting-for-confirmation + released.`);
                } else {
                  console.log(`Issue #${num} is already closed, skipping.`);
                }
              }
            }

            // Process issues discovered from PR bodies
            if (linkedIssueQueue.size > 0) {
              console.log(`Processing ${linkedIssueQueue.size} issue(s) linked from PR bodies: #${[...linkedIssueQueue].join(', #')}`);
              for (const num of linkedIssueQueue) {
                await processIssue(num);
              }
            }
