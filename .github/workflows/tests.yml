name: Tests

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Format check (Black)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Black
        run: pip install black==25.1.0

      - name: Run black --check
        run: black --check .

  test:
    name: Test (Python ${{ matrix.python-version }} / HA ${{ matrix.ha-channel }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
            ha-channel: stable
            experimental: false
          - python-version: "3.14"
            ha-channel: dev
            experimental: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (stable — HA 2026.3.1)
        if: matrix.ha-channel == 'stable'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install dependencies (dev — HA dev branch)
        if: matrix.ha-channel == 'dev'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --upgrade --no-cache-dir pytest-homeassistant-custom-component
          pip install --upgrade --no-cache-dir git+https://github.com/home-assistant/core.git@dev

      - name: Show HA version
        run: python -c "from homeassistant.const import __version__; print('HA version:', __version__)"

      - name: Run tests with coverage
        run: |
          pytest --cov --cov-report=xml --cov-report=term \
            --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov (stable only)
        if: matrix.python-version == '3.14' && matrix.ha-channel == 'stable'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov (stable only)
        if: ${{ !cancelled() && matrix.python-version == '3.14' && matrix.ha-channel == 'stable' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
