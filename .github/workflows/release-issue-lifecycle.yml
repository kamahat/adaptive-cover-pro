name: "Release Issue Lifecycle"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v2.18.1)"
        required: true
      release_url:
        description: "Release URL"
        required: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  release-lifecycle:
    name: "Process Issues on Stable Release"
    runs-on: ubuntu-latest
    # Only run for stable releases; skip betas/pre-releases (release event only)
    if: github.event_name == 'workflow_dispatch' || (github.event.release.prerelease == false && !contains(github.event.release.tag_name, '-beta') && !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-rc'))

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "Find previous stable tag and extract issue references"
        id: refs
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name || inputs.tag_name }}"

          # Find the previous stable tag (exclude pre-release AND nightly tags).
          # Nightlies are now PEP440 .dev builds (no hyphen) plus legacy -nightly.;
          # both must be excluded or one could be picked as PREV_TAG, yielding an
          # empty commit range and zero issue refs.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -v -E '\-(beta|alpha|rc|nightly)\.|\.dev' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -1)

          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "Previous stable tag: ${PREV_TAG:-'(none)'}"

          # Get commit range
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"%s%n%b" "${CURRENT_TAG}")
          else
            LOG=$(git log --pretty=format:"%s%n%b" "${PREV_TAG}..${CURRENT_TAG}")
          fi

          # Extract unique issue/PR numbers — keyword refs and bare (#NNN) parentheticals
          NUMBERS=$(echo "$LOG" \
            | grep -ioE '(refs?|closes?|fixes?|resolves?)[[:space:]]+#[0-9]+|\(#[0-9]+\)' \
            | grep -oE '[0-9]+' \
            | sort -u \
            | tr '\n' ' ')

          echo "numbers=${NUMBERS}" >> $GITHUB_OUTPUT
          echo "Referenced numbers: ${NUMBERS:-'(none)'}"

      - name: "Tag + close released issues; notify PRs"
        uses: actions/github-script@v9
        env:
          NUMBERS: ${{ steps.refs.outputs.numbers }}
          CURRENT_TAG: ${{ steps.refs.outputs.current_tag }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
        with:
          script: |
            const numbers = process.env.NUMBERS.trim().split(/\s+/).filter(Boolean).map(Number);
            const tag = process.env.CURRENT_TAG;
            const releaseUrl = process.env.RELEASE_URL;
            const { owner, repo } = context.repo;

            // Single close message — covers both this release's fixes and any
            // stragglers swept up below. Stable releases close `released` issues
            // immediately; reporters reopen on request (see issue-reopen-on-request.yml).
            const closeComment =
              `The fix for this shipped in a stable release — latest: [**${tag}**](${releaseUrl}). I'm closing this out.\n\n` +
              `If you're still affected, just comment here (e.g. "still happening" or \`/reopen\`) and I'll reopen it — ` +
              `or open a new issue with fresh details (and a diagnostics file if it's a cover-behavior problem). Thanks for the report!`;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
                console.log(`Created ${name} label.`);
              }
            }
            await ensureLabel('released', '0E8A16', 'Fix has shipped in a stable production release');
            await ensureLabel('reopened', 'D93F0B', "Reopened after the shipped fix didn't resolve it");

            // Cache fetched items to avoid redundant API calls
            const itemCache = new Map();
            async function fetchItem(num) {
              if (itemCache.has(num)) return itemCache.get(num);
              try {
                const { data } = await github.rest.issues.get({ owner, repo, issue_number: num });
                itemCache.set(num, data);
                return data;
              } catch {
                itemCache.set(num, null);
                return null;
              }
            }

            const removeLabelSafe = (num, name) =>
              github.rest.issues.removeLabel({ owner, repo, issue_number: num, name }).catch(() => {});

            // Tag a referenced OPEN issue `released`; the sweep below closes it.
            async function tagReferencedIssue(num, labels) {
              if (labels.includes('awaiting-release')) await removeLabelSafe(num, 'awaiting-release');
              if (labels.includes('reopened')) await removeLabelSafe(num, 'reopened');
              if (!labels.includes('released')) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['released'] });
              }
              console.log(`Tagged issue #${num} as released.`);
            }

            const seenNumbers = new Set(numbers);
            const linkedIssueQueue = new Set();

            if (numbers.length === 0) {
              console.log('No issue/PR references found in this release range.');
            } else {
              console.log(`Processing: #${numbers.join(', #')}`);
              for (const num of numbers) {
                const item = await fetchItem(num);
                if (!item) { console.log(`#${num} not found, skipping.`); continue; }
                const labels = item.labels.map(l => l.name);

                if (item.pull_request) {
                  // Merged PR — notify (no close), drop awaiting-release, scan body for linked issues.
                  if (labels.includes('awaiting-release')) await removeLabelSafe(num, 'awaiting-release');
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: num,
                    body: `This was included in [**${tag}**](${releaseUrl}). Thank you for the contribution! 🎉`,
                  });
                  console.log(`Notified PR #${num} of release ${tag}.`);
                  try {
                    const prData = await github.rest.pulls.get({ owner, repo, pull_number: num });
                    const prBody = prData.data.body || '';
                    const bodyPattern = /(?:refs?|closes?|fixes?|resolves?)\s+#(\d+)/gi;
                    let m;
                    while ((m = bodyPattern.exec(prBody)) !== null) {
                      const linkedNum = parseInt(m[1], 10);
                      if (linkedNum !== num && !seenNumbers.has(linkedNum)) linkedIssueQueue.add(linkedNum);
                    }
                  } catch {
                    console.log(`Could not fetch PR body for #${num}, skipping body scan.`);
                  }
                } else if (item.state === 'open') {
                  await tagReferencedIssue(num, labels);
                } else {
                  console.log(`Issue #${num} already closed, skipping relabel.`);
                }
              }

              // Issues discovered from PR bodies
              if (linkedIssueQueue.size > 0) {
                console.log(`Processing ${linkedIssueQueue.size} issue(s) linked from PR bodies: #${[...linkedIssueQueue].join(', #')}`);
                for (const num of linkedIssueQueue) {
                  const item = await fetchItem(num);
                  if (!item) { console.log(`#${num} not found, skipping.`); continue; }
                  if (item.pull_request) continue;
                  if (item.state === 'open') {
                    await tagReferencedIssue(num, item.labels.map(l => l.name));
                  } else {
                    console.log(`Issue #${num} already closed, skipping relabel.`);
                  }
                }
              }
            }

            // Sweep: close every OPEN issue carrying `released` (just-tagged + any
            // stragglers). This is what "all issues tagged released are closed" means.
            const releasedOpen = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'released', per_page: 100,
            });
            let closed = 0;
            for (const item of releasedOpen) {
              if (item.pull_request) continue; // never close PRs
              await github.rest.issues.createComment({ owner, repo, issue_number: item.number, body: closeComment });
              await github.rest.issues.update({ owner, repo, issue_number: item.number, state: 'closed', state_reason: 'completed' });
              console.log(`Closed released issue #${item.number}.`);
              closed++;
            }
            console.log(`Sweep closed ${closed} released issue(s).`);
