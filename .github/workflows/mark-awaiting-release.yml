name: "Mark Issues Awaiting Release"

on:
  push:
    branches:
      - develop
      - main

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  mark-awaiting-release:
    name: "Label Referenced Issues"
    runs-on: ubuntu-latest

    steps:
      - name: "Process pushed commit references"
        uses: actions/github-script@v9
        with:
          script: |
            // Parse issue references out of every commit message in this push.
            // Squash-merged PRs carry the branch's "Refs #NNN" lines in the squash
            // commit body; direct commits to develop carry them too. A single push
            // trigger therefore covers both paths — no PR event needed.
            const commits = context.payload.commits || [];

            // Only keyword-prefixed references count, so squash titles like
            // "fix: foo (#754)" (a PR ref with no keyword) are ignored — we only
            // want the issues a fix actually resolves. A fresh regex per call keeps
            // the global lastIndex state from leaking between scans.
            const collectRefs = (text, into) => {
              const pattern = /(?:refs?|closes?|fixes?|resolves?)\s+#(\d+)/gi;
              let match;
              while ((match = pattern.exec(text || '')) !== null) {
                into.add(parseInt(match[1], 10));
              }
            };

            const found = new Set();
            collectRefs(commits.map(c => c.message).join('\n'), found);

            // Fallback: the keyword-ref can be lost when a squash merge uses a
            // custom commit body that drops the PR's "Refs #NNN" line (issue #474
            // shipped this way). The reference still lives in the PR body, so scan
            // the PRs associated with each pushed commit. Idempotent with the
            // commit scan above — dedup happens in the `found` Set.
            for (const sha of new Set(commits.map(c => c.id).filter(Boolean))) {
              try {
                const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: sha,
                });
                for (const pr of prs.data) {
                  collectRefs(`${pr.title}\n${pr.body || ''}`, found);
                }
              } catch (e) {
                console.log(`Could not list PRs for ${sha}: ${e.message}`);
              }
            }

            if (found.size === 0) {
              console.log('No issue references found in this push.');
              return;
            }

            console.log(`Found references: #${[...found].join(', #')}`);

            // Ensure the awaiting-release label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'awaiting-release',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'awaiting-release',
                color: 'FFA500',
                description: 'Fix merged, pending next stable release',
              });
              console.log('Created awaiting-release label.');
            }

            for (const num of found) {
              let item;
              try {
                const response = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                item = response.data;
              } catch {
                console.log(`#${num} not found, skipping.`);
                continue;
              }

              // Never touch PRs — only issues get the awaiting-release lifecycle.
              if (item.pull_request) {
                console.log(`#${num} is a PR, skipping.`);
                continue;
              }

              // Idempotency guard. Skipping anything already in the lifecycle keeps
              // replayed pushes (the release-time develop→main merge, the hotfix
              // main→develop forward-merge) from re-labeling or re-commenting, and
              // prevents downgrading an already-shipped issue.
              const labels = (item.labels || []).map(l => (typeof l === 'string' ? l : l.name));
              if (labels.includes('released')) {
                console.log(`Issue #${num} already released, skipping.`);
                continue;
              }
              if (labels.includes('awaiting-release')) {
                console.log(`Issue #${num} already awaiting-release, skipping.`);
                continue;
              }

              const isOpen = item.state === 'open';

              if (isOpen) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  labels: ['awaiting-release'],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: `A fix for this issue has been merged and will ship in the next stable release.\n\nIt is also included in the next [nightly dev build](https://github.com/${context.repo.owner}/${context.repo.repo}/releases) (a \`.dev\` pre-release built from \`develop\` each night) if you'd like to test it early.`,
                });
                console.log(`Labeled issue #${num} as awaiting-release.`);
              } else if (item.state_reason === 'completed') {
                // Auto-closed by a Closes/Fixes keyword on the default branch.
                // Reopen so the normal release lifecycle can run. Issues closed as
                // "not_planned" are intentional — leave them alone.
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  state: 'open',
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  labels: ['awaiting-release'],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: `A fix for this issue has been merged and will ship in the next stable release.\n\nIt is also included in the next [nightly dev build](https://github.com/${context.repo.owner}/${context.repo.repo}/releases) (a \`.dev\` pre-release built from \`develop\` each night) if you'd like to test it early.\n\n_(This issue was briefly auto-closed by a commit keyword and has been reopened to follow the normal release lifecycle.)_`,
                });
                console.log(`Reopened and labeled issue #${num} as awaiting-release.`);
              } else {
                console.log(`Issue #${num} is closed (state_reason: ${item.state_reason}), skipping.`);
              }
            }
