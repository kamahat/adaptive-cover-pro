name: Notebook Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "notebooks/**"
      - "custom_components/adaptive_cover_pro/calculation.py"
      - "custom_components/adaptive_cover_pro/sun.py"
      - "custom_components/adaptive_cover_pro/engine/**"
      - "requirements-dev.txt"
      - ".github/workflows/notebook-validation.yml"
  push:
    branches:
      - main
      - develop
      - feature/*
    paths:
      - "notebooks/**"
      - "custom_components/adaptive_cover_pro/calculation.py"
      - "custom_components/adaptive_cover_pro/sun.py"
      - "custom_components/adaptive_cover_pro/engine/**"
      - "requirements-dev.txt"
      - ".github/workflows/notebook-validation.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-notebook:
    name: Validate Jupyter Notebook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python + dev deps
        uses: ./.github/actions/setup-python-deps

      - name: Execute notebook
        run: |
          cd notebooks
          jupyter nbconvert --to notebook --execute --inplace test_env.ipynb

      - name: Upload generated plots
        if: always() # Upload even if notebook fails (might have partial plots)
        uses: actions/upload-artifact@v7
        with:
          name: notebook-plots
          path: notebooks/outputs/*.png
          if-no-files-found: warn
          retention-days: 30
